<!-- ═══════════════════════════════════════════════════════════
     _includes/submenu.html
     Usage: {%- include submenu.html items=item.children -%}
     Renders an accessible dropdown <ul> for child nav items.
════════════════════════════════════════════════════════════ -->

<ul class="submenu" role="menu">
  {%- for child in include.items -%}
    {%- assign child_active = false -%}
    {%- if page.url == child.url -%}
      {%- assign child_active = true -%}
    {%- endif -%}

    <li class="submenu__item" role="none">
      <a
        href="{{ child.url | relative_url }}"
        class="submenu__link{% if child_active %} is-active{% endif %}"
        role="menuitem"
        {% if child_active %}aria-current="page"{% endif %}
      >
        {{ child.title }}
      </a>
    </li>
  {%- endfor -%}
</ul>
