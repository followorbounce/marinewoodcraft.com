<!-- ═══════════════════════════════════════════════════════════
     _includes/post-nav.html
     Renders previous / next post navigation within the same category.
════════════════════════════════════════════════════════════ -->

<nav class="post-nav" aria-label="Post navigation">
  {%- if page.previous.url %}
  <a class="post-nav__link post-nav__link--prev" href="{{ page.previous.url | relative_url }}">
    <span class="post-nav__dir" aria-hidden="true">←</span>
    <span class="post-nav__title">{{ page.previous.title | truncate: 40 }}</span>
  </a>
  {%- endif %}

  {%- if page.next.url %}
  <a class="post-nav__link post-nav__link--next" href="{{ page.next.url | relative_url }}">
    <span class="post-nav__title">{{ page.next.title | truncate: 40 }}</span>
    <span class="post-nav__dir" aria-hidden="true">→</span>
  </a>
  {%- endif %}
</nav>
