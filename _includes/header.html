<!-- ═══════════════════════════════════════════════════════════
     _includes/header.html
     Renders the fixed site header: wordmark bar + menu bar.
     Navigation items are driven by _data/navigation.yml.
════════════════════════════════════════════════════════════ -->

<header class="site-header" role="banner">

  <!-- ── Top bar: wordmark + meta ──────────────────────────── -->
  <div class="nav-top">
    <a class="wordmark" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      Follow<span class="wordmark__accent">.</span>Or<span class="wordmark__accent">.</span>Bounce
    </a>
    <span class="nav-meta" aria-hidden="true">
      Est.&nbsp;{{ site.brand.established }}&nbsp;/&nbsp;{{ site.brand.issue }}
    </span>
  </div>

  <!-- ── Primary navigation ────────────────────────────────── -->
  {%- include nav.html -%}

</header>
