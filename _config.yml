# ────────────────────────────────────────────────────────────
#  Follow or Bounce — Jekyll Configuration
# ────────────────────────────────────────────────────────────

# Site identity
title: "Follow or Bounce"
tagline: "Ideas that stick, or they don't."
description: >
  A publication at the intersection of technology, literature,
  and the agreements that hold them together. Signal over noise. Always.
baseurl: ""          # subpath, e.g. "/blog" — leave empty for root
url: "https://followorbounce.com"

# Branding meta
brand:
  issue: "Issue 01"
  established: "2024"
  email: "followorbounce@gmail.com"

# Build
source:      .
destination: ./_site
timezone:    America/Honolulu

# Markdown / converter
markdown:    kramdown
highlighter: rouge
kramdown:
  input:          GFM
  syntax_highlighter: rouge
  hard_wrap:      false

# Sass
sass:
  sass_dir:  _sass
  style:     compressed    # "expanded" for dev debugging

# Permalink structure
permalink:   /:categories/:title/

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
    values:
      layout:    default
      sitemap:   true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md
  - "*.sh"
